name: Deployment Pipeline

on:
  push:
    branches:
      - main
    paths:
      - app.py
      - config.py
      - templates/**
      - static/**
      - Dockerfile
      - requirements.txt
      - docker-compose.yml

jobs:

  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Print environment variables
        run: |
          echo "Deploying to STAGING environment"
          echo "Branch: $GITHUB_REF"
          echo "Commit: $GITHUB_SHA"

      - name: Build Docker Image (staging)
        run: docker build -t sakila-app:staging .

      - name: Run container (simulation)
        run: docker run -d -p 5000:5000 sakila-app:staging

      - name: Deployment Summary
        run: |
          echo "## Staging Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: Staging" >> $GITHUB_STEP_SUMMARY
          echo "- Image: sakila-app:staging" >> $GITHUB_STEP_SUMMARY
          echo "- Status: Success" >> $GITHUB_STEP_SUMMARY

      - name: Notify
        run: echo "Slack notification: Deployment to staging successful"


  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Simulate Production Deployment
        run: |
          echo "🚀 Deploying to PRODUCTION environment"
          echo "Commit: $GITHUB_SHA"

      - name: Generate version tag
        id: version
        run: echo "VERSION=v$(date +'%Y.%m.%d')" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          body: "Production deployment successful"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify
        run: echo "Slack notification: Deployment to production successful"