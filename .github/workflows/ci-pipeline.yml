name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: 3.9
  IMAGE_NAME: sakila-app

  jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 . --max-line-length=120 --ignore=E501,W503

    test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: admin
          MYSQL_DATABASE: sakila
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -padmin"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Wait for MySQL
        run: sleep 20

      - name: Import Sakila DB
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip
          wget https://github.com/jOOQ/sakila/raw/master/mysql-sakila-db/sakila-schema.sql
          wget https://github.com/jOOQ/sakila/raw/master/mysql-sakila-db/sakila-data.sql
          mysql -h 127.0.0.1 -uroot -padmin sakila < sakila-schema.sql
          mysql -h 127.0.0.1 -uroot -padmin sakila < sakila-data.sql

      - name: Run tests
        run: pytest -v
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_USER: root
          MYSQL_PASSWORD: admin
          MYSQL_DB: sakila

    build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t sakila-app:${{ github.sha }} .

      - name: Verify image exists
        run: docker images

      - name: Run container (smoke test)
        run: |
          docker run -d -p 5000:5000 --name sakila-test sakila-app:${{ github.sha }}
          sleep 10
          curl -f http://localhost:5000 || echo "App not responding"

    security-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image again
        run: docker build -t sakila-app:${{ github.sha }} .

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: sakila-app:${{ github.sha }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Upload scan report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-results.txt